/* ==========================================================================

   ========================================================================== */

function injectSeoTags() {
  const { seo }   = BUILD;
  const title     = translate(seo.title);
  const desc      = translate(seo.description);
  const keywords  = translate(seo.keywords);
  const ogLocale  = lang === "en" ? "en_US" : "es_ES";

  document.title = title;

  const setMeta = (selector, attr, value) => {
    const el = document.querySelector(selector);
    if (el && value) el.setAttribute(attr, value);
  };

  setMeta('meta[name="description"]',          "content", desc);
  setMeta('meta[name="keywords"]',             "content", keywords);
  setMeta('meta[name="author"]',               "content", seo.author);
  setMeta('link[rel="canonical"]',             "href",    seo.pageUrl);
  setMeta('meta[property="og:title"]',         "content", title);
  setMeta('meta[property="og:description"]',   "content", desc);
  setMeta('meta[property="og:url"]',           "content", seo.pageUrl);
  setMeta('meta[property="og:locale"]',        "content", ogLocale);
  setMeta('meta[name="twitter:title"]',        "content", title);
  setMeta('meta[name="twitter:description"]',  "content", desc);

  if (seo.twitterHandle) {
    document.head.insertAdjacentHTML(
      "beforeend",
      `<meta name="twitter:site" content="${seo.twitterHandle}">`
    );
  }

  // JSON-LD structured data (Article schema)
  const jsonLd = {
    "@context":    "https://schema.org",
    "@type":       "Article",
    "headline":    title,
    "description": desc,
    "author":      { "@type": "Organization", "name": seo.author },
    "url":         seo.pageUrl,
    "inLanguage":  lang,
    "about": {
      "@type": "VideoGame",
      "name":  "Dark Souls III",
    },
  };

  document.head.insertAdjacentHTML(
    "beforeend",
    `<script type="application/ld+json">${JSON.stringify(jsonLd, null, 2)}<\/script>`
  );
}

injectSeoTags();

/* ==========================================================================
   RENDER HELPERS
   ========================================================================== */

/**
 * Splits the build title so the last word renders inside <em>.
 * @param {string} rawTitle
 * @returns {string} HTML string
 */
function formatHeroTitle(rawTitle) {
  const words = rawTitle.toUpperCase().split(" ");
  if (words.length === 1) return `<em>${words[0]}</em>`;
  return words.slice(0, -1).join(" ") + "<br><em>" + words.at(-1) + "</em>";
}

/**
 * Converts a stat value (0–99) to a CSS percentage string for the fill bar.
 * @param {number} value
 * @returns {string}
 */
function toFillWidth(value) {
  const clamped = Math.min(Math.max(value, 0), 99);
  return Math.round(clamped / 99 * 100) + "%";
}

/**
 * Wraps content inside a numbered section with header and rule.
 * @param {string} romanNumeral
 * @param {string} title
 * @param {string} subtitle
 * @param {string} content  - inner HTML
 * @returns {string} HTML string
 */
function renderSection(romanNumeral, title, subtitle, content) {
  return `
    <section class="section js-reveal" aria-label="${title}">
      <div class="section__header">
        <div class="section__number" aria-hidden="true">${romanNumeral}</div>
        <div class="section__titles">
          <h2>${title}</h2>
          <p>${subtitle}</p>
        </div>
        <div class="section__rule" aria-hidden="true"></div>
      </div>
      ${content}
    </section>`;
}

function renderStats() {
  const cells = BUILD.stats.map(stat => {
    const name          = translate(stat.name);
    const note          = translate(stat.note);
    const highlightMod  = stat.highlighted ? " stat-cell--highlighted" : "";

    return `
      <div class="stat-cell${highlightMod}" style="--fill-width: ${toFillWidth(stat.value)}">
        <span class="stat-cell__label">${name} (${stat.abbr})</span>
        <div class="stat-cell__value">${stat.value}</div>
        ${note ? `<div class="stat-cell__note">${note}</div>` : ""}
      </div>`;
  }).join("");

  return `
    <div class="stats-panel">
      <div class="stats-panel__header">
        ${str.headerClass}: ${info.startingClass.toUpperCase()} &nbsp;·&nbsp; ${str.headerLevel}: ${info.targetLevel}
      </div>
      <div class="stats-panel__summary">
        <div>
          <div class="stats-panel__level-label">${str.levelLabel}</div>
          <div class="stats-panel__level-value">${info.targetLevel}</div>
        </div>
        <div>
          <div class="stats-panel__class-note">${str.classNote}</div>
          <div class="stats-panel__class-name">${info.startingClass}</div>
        </div>
      </div>
      <div class="stats-grid" role="list">${cells}</div>
    </div>`;
}

/**
 * Builds an <img> tag that tries the local src first,
 * then falls back to the external URL if local fails to load.
 * Returns a placeholder SVG string if both sources are empty.
 *
 * @param {{ local: string, fallback: string }} imageObj
 * @param {string} altText
 * @param {string} cssClass
 * @param {string} placeholderSvg  - raw SVG string shown when no src is available
 * @returns {string} HTML string
 */
function resolveImage(imageObj, altText, cssClass, placeholderSvg) {
  const local    = imageObj?.local    ?? "";
  const fallback = imageObj?.fallback ?? "";

  if (!local && !fallback) return placeholderSvg;

  // Start with local; on error, swap to fallback (or remove src to hide broken icon)
  const onError = fallback
    ? `this.onerror=null; this.src='${fallback}';`
    : `this.style.display='none';`;

  return `<img
    class="${cssClass}"
    src="${local || fallback}"
    alt="${altText}"
    loading="lazy"
    onerror="${onError}"
  >`;
}

function renderWeapons() {
  const cards = BUILD.weapons.map(weapon => {
    const featuredMod = weapon.featured ? " weapon-card--featured" : "";

    const slotImage = resolveImage(
      weapon.image,
      weapon.name,
      "weapon-card__slot-image",
      PLACEHOLDER_SVG_WEAPON
    );

    const miniStats = weapon.miniStats.map(s => `
      <div class="mini-stat">
        <span class="mini-stat__label">${translate(s.label)}</span>
        <span class="mini-stat__value">${s.value}</span>
      </div>`).join("");

    return `
      <article class="weapon-card${featuredMod}">
        <div class="weapon-card__header">
          <div class="weapon-card__slot" aria-hidden="true">${slotImage}</div>
          <div class="weapon-card__header-text">
            <div class="weapon-card__badge">${translate(weapon.badge)}</div>
            <h3 class="weapon-card__name">${weapon.name}</h3>
            <div class="weapon-card__subtitle">${translate(weapon.subtitle)}</div>
          </div>
        </div>
        <div class="weapon-card__body">
          <div class="weapon-card__mini-stats" aria-label="weapon stats">${miniStats}</div>
          <p class="weapon-card__description">${translate(weapon.description)}</p>
          <div class="weapon-card__location">
            <span class="weapon-card__location-label">${str.locationLabel}</span>
            ${translate(weapon.location)}
          </div>
        </div>
      </article>`;
  }).join("");

  return `<div class="weapon-grid">${cards}</div>`;
}

function renderRings() {
  const cards = BUILD.rings.map(ring => {
    const slotImage = resolveImage(
      ring.image,
      ring.name,
      "ring-card__slot-image",
      PLACEHOLDER_SVG_RING
    );

    // If no image resolved to a real <img>, fall back to the emoji icon
    const slotContent = (ring.image?.local || ring.image?.fallback)
      ? slotImage
      : `<span class="ring-card__slot-fallback" aria-hidden="true">${ring.icon}</span>`;

    return `
    <article class="ring-card">
      <div class="ring-card__slot" aria-label="${ring.name} icon">
        <div class="ring-card__slot-inner">${slotContent}</div>
      </div>
      <div class="ring-card__body">
        <h3 class="ring-card__name">${ring.name}</h3>
        <p class="ring-card__effect">${translate(ring.effect)}</p>
        <p class="ring-card__location">📍 ${translate(ring.location)}</p>
      </div>
    </article>`;
  }).join("");

  return `<div class="ring-grid">${cards}</div>`;
}

function renderArmor() {
  const pieces = BUILD.armor.map(piece => {
    const slotImage = resolveImage(
      piece.image,
      piece.name,
      "armor-piece__slot-image",
      PLACEHOLDER_SVG_ARMOR
    );

    return `
    <article class="armor-piece">
      <div class="armor-piece__header">
        <div class="armor-piece__slot-box" aria-hidden="true">${slotImage}</div>
        <span class="armor-piece__slot-label">☩ ${translate(piece.slot)}</span>
      </div>
      <div class="armor-piece__body">
        <h3 class="armor-piece__name">${piece.name}</h3>
        <p class="armor-piece__description">${translate(piece.description)}</p>
        <p class="armor-piece__alternative">${str.alternativeLabel} ${translate(piece.alternative)}</p>
      </div>
    </article>`;
  }).join("");

  return `<div class="armor-grid">${pieces}</div>`;
}

/* ==========================================================================
   INTERSECTION OBSERVERS
   ========================================================================== */

/**
 * Creates a one-shot IntersectionObserver that adds a CSS class when
 * an element enters the viewport, then stops observing it.
 * @param {string} selector     - CSS selector for target elements
 * @param {string} activeClass  - class added on intersection
 * @param {number} threshold    - 0–1 visibility ratio to trigger
 */
function createRevealObserver(selector, activeClass, threshold = 0.08) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add(activeClass);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold });

  document.querySelectorAll(selector).forEach(el => observer.observe(el));
}

createRevealObserver(".js-reveal", "js-reveal--visible", 0.08);
createRevealObserver(".stat-cell", "stat-cell--animated", 0.30);
