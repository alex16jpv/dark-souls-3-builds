}

 */
function renderCard(build, index) {
  const tc          = THEME_COLORS[build.theme] ?? FALLBACK_THEME;
  const featuredMod = build.featured ? " build-card--featured" : "";

  const tags = build.tags
    .map(tag => `<span class="card-tag">${tag}</span>`)
    .join("");

  // Roman numerals up to 5 (enough for the expected build count)
  const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];
  const ghost = ROMAN[index] ?? (index + 1);

  return `
    <a class="build-card${featuredMod}"
       href="${build.file}"
       style="${buildThemeVars(build.theme)}"
       data-theme="${build.theme}"
       aria-label="Ver guía: ${build.title}">

      <!-- Header -->
      <div class="card-header">
        <div class="card-header__ghost-number" aria-hidden="true">${ghost}</div>
        <div class="card-header__left">
          <div class="card-tags">${tags}</div>
          <h2 class="card-title">${build.title}</h2>
        </div>
        ${build.featured
          ? `<div class="card-featured-badge">★ Destacada</div>`
          : ""}
      </div>

      <!-- Stats -->
      <div class="card-stats">
        <div class="card-stat">
          <span class="card-stat__label">Clase Inicial</span>
          <span class="card-stat__value">${build.startingClass}</span>
        </div>
        <div class="card-stat">
          <span class="card-stat__label">Soul Level</span>
          <span class="card-stat__value">${build.targetLevel}</span>
        </div>
        <div class="card-stat card-stat--theme">
          <span class="card-stat__label">Tipo</span>
          <span class="card-stat__value">${tc.label}</span>
        </div>
      </div>

      <!-- Footer CTA -->
      <div class="card-footer">
        <span class="card-cta">
          Ver Build
          <svg class="card-cta__arrow" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </span>
      </div>
    </a>`;
}

/**
 * Builds the filter button row from the unique themes present in BUILDS.
 * @returns {string} HTML string
 */
function renderFilterBar() {
  const uniqueThemes = [...new Set(BUILDS.map(b => b.theme))];
  const themeButtons = uniqueThemes.map(key => {
    const tc = THEME_COLORS[key] ?? FALLBACK_THEME;
    return `<button
      class="filter-btn"
      data-filter="${key}"
      style="--c-accent:${tc.accent};"
      aria-pressed="false">${tc.label}</button>`;
  }).join("");

  return `
    <span class="filter-bar__label">Filtrar por</span>
    <button class="filter-btn filter-btn--active" data-filter="all" aria-pressed="true">
      Todas
    </button>
    ${themeButtons}`;
}

/* ==========================================================================
   FILTER LOGIC
   ========================================================================== */

function initFilters() {
  const filterBar  = document.querySelector(".filter-bar");
  const grid       = document.getElementById("builds-grid");
  const countLabel = document.getElementById("visible-count");
  const total      = BUILDS.length;

  filterBar.addEventListener("click", (e) => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;

    const filter = btn.dataset.filter;

    // Update active state on buttons
    filterBar.querySelectorAll(".filter-btn").forEach(b => {
      const isActive = b === btn;
      b.classList.toggle("filter-btn--active", isActive);
      b.setAttribute("aria-pressed", String(isActive));
    });

    // Show/hide cards with staggered re-entrance animation
    const cards = [...grid.querySelectorAll(".build-card")];
    let visibleCount = 0;
    let staggerDelay = 0;

    cards.forEach(card => {
      const matches = filter === "all" || card.dataset.theme === filter;

      if (matches) {
        card.style.display = "";
        card.classList.remove("build-card--visible");
        setTimeout(() => card.classList.add("build-card--visible"), staggerDelay);
        staggerDelay += 80;
        visibleCount++;
      } else {
        card.classList.remove("build-card--visible");
        // Delay display:none until the fade-out transition ends
        setTimeout(() => { card.style.display = "none"; }, 320);
      }
    });

    countLabel.textContent = `${visibleCount} de ${total}`;

    // Toggle empty state message
    const existingEmpty = grid.querySelector(".empty-state");
    if (visibleCount === 0 && !existingEmpty) {
      const emptyEl = document.createElement("p");
      emptyEl.className = "empty-state";
      emptyEl.textContent = "No hay builds de este tipo todavía.";
      grid.appendChild(emptyEl);
    } else if (visibleCount > 0) {
      existingEmpty?.remove();
    }
  });
}


/* ==========================================================================
   SCROLL REVEAL
   ========================================================================== */

function initScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;

      // Stagger by column position (index mod columns)
      const cards = [...document.querySelectorAll(".build-card")];
      const col   = cards.indexOf(entry.target) % 2; // max 2 columns
      setTimeout(
        () => entry.target.classList.add("build-card--visible"),
        col * 100
      );
      observer.unobserve(entry.target);
    });
  }, { threshold: 0.06 });

  document.querySelectorAll(".build-card").forEach(card => observer.observe(card));
}


/* ==========================================================================
   INIT
   ========================================================================== */

initFilters();
initScrollReveal();
</script>
